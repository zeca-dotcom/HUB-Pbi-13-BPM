<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>13 BPM - Hub de Dashboards Power BI</title>
  <style>
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #1a1a1a;
      --accent: #00d4ff;
      --accent-glow: #00d4ff40;
      --text-primary: #ffffff;
      --text-secondary: #b0b0b0;
      --border: #333;
      --border-glow: #00d4ff20;
      --success: #00ff88;
      --error: #ff4d4d;
    }

    * { box-sizing: border-box; }
    
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
      background: linear-gradient(135deg, var(--bg-primary) 0%, #0f0f23 100%);
      background-attachment: fixed;
      color: var(--text-primary);
      max-width: 1400px; 
      margin: 0 auto; 
      padding: 20px;
      min-height: 100vh;
    }

    h1 { 
      text-align: center; 
      font-size: 2.2em;
      background: linear-gradient(45deg, var(--accent), #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 40px;
      text-shadow: 0 0 30px var(--accent-glow);
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { filter: drop-shadow(0 0 10px var(--accent-glow)); }
      to { filter: drop-shadow(0 0 20px var(--accent-glow)); }
    }

    .report-section { 
      margin: 30px 0; 
      border: 1px solid var(--border);
      border-radius: 16px; 
      padding: 0;
      background: var(--bg-secondary);
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transition: all 0.3s ease;
      position: relative;
    }

    .report-section:hover {
      border-color: var(--accent);
      box-shadow: 0 12px 48px var(--accent-glow), 0 0 0 1px var(--accent-glow);
      transform: translateY(-4px);
    }

    .report-header {
      padding: 24px 28px;
      background: linear-gradient(90deg, var(--bg-secondary), transparent);
      border-bottom: 1px solid var(--border);
    }

    .report-title { 
      font-size: 1.5em; 
      font-weight: 600; 
      margin: 0;
      background: linear-gradient(45deg, var(--text-primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .locked { 
      padding: 40px 28px; 
      text-align: center; 
      background: radial-gradient(ellipse at center, #1a1a1a 0%, var(--bg-secondary) 70%);
    }

    .unlock-btn { 
      background: linear-gradient(45deg, var(--accent), #00b8e6);
      color: white; 
      border: none; 
      padding: 14px 28px; 
      border-radius: 50px; 
      cursor: pointer; 
      font-size: 1em;
      font-weight: 500;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .unlock-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s;
    }

    .unlock-btn:hover::before { left: 100%; }
    .unlock-btn:hover { 
      transform: scale(1.05); 
      box-shadow: 0 8px 25px var(--accent-glow);
    }

    input[type="password"] { 
      padding: 12px 16px; 
      margin: 0 12px; 
      border: 2px solid var(--border); 
      border-radius: 12px; 
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 1em;
      min-width: 200px;
      transition: all 0.3s ease;
    }

    input[type="password"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .error { 
      color: var(--error); 
      font-size: 0.95em; 
      margin-left: 12px; 
      display: none;
      animation: shake 0.5s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .report-frame { 
      display: none; 
      position: relative;
      background: var(--bg-primary);
    }

    .report-frame iframe {
      width: 100%; 
      height: 550px; 
      border: none; 
      border-radius: 0 0 16px 16px;
    }

    @media (max-width: 768px) {
      body { padding: 10px; }
      h1 { font-size: 1.8em; }
      .report-frame iframe { height: 400px; }
      input[type="password"] { min-width: 150px; display: block; margin: 10px auto; }
      .unlock-btn { padding: 12px 24px; width: 100%; max-width: 300px; }
    }
  </style>
</head>
<body>
  <h1>13 BPM - Hub de Dashboards Power BI</h1>
  
  <!-- Report 1: Interações Comunitárias -->
  <div class="report-section">
    <div class="report-header">
      <h2 class="report-title">🔗 Interações Comunitárias</h2>
    </div>
    <div class="locked" id="iic-locked">
      <button class="unlock-btn" onclick="promptPassword('iic')">Desbloquear Dashboard</button>
      <span class="error" id="iic-error"></span>
    </div>
    <div class="report-frame" id="iic-frame">
      <iframe title="iic - 2025" src="https://app.powerbi.com/view?r=eyJrIjoiZjFlYWU5N2ItMmQ1Ny00NjBiLWJkY2ItZmZjYWQxNTQwYmM1IiwidCI6IjdjYWI1NzFlLWEyMGUtNDg2Mi1iNWY2LTE3M2I5NjEzMWYxOCJ9" allowfullscreen></iframe>
    </div>
  </div>

  <!-- Report 2: Núcleo de Justiça e Disciplina -->
  <div class="report-section">
    <div class="report-header">
      <h2 class="report-title">⚖️ Núcleo de Justiça e Disciplina</h2>
    </div>
    <div class="locked" id="njd-locked">
      <button class="unlock-btn" onclick="promptPassword('njd')">Desbloquear Dashboard</button>
      <span class="error" id="njd-error"></span>
    </div>
    <div class="report-frame" id="njd-frame">
      <iframe title="njd_13bpm" src="https://app.powerbi.com/view?r=eyJrIjoiZTVlMDRhMDItYzRmNy00MzY5LWI3MmEtZWEyZjRmNjg3M2QyIiwidCI6IjdjYWI1NzFlLWEyMGUtNDg2Mi1iNWY2LTE3M2I5NjEzMWYxOCJ9" allowfullscreen></iframe>
    </div>
  </div>

  <!-- Report 3: Licenças e Dispensas Médicas -->
  <div class="report-section">
    <div class="report-header">
      <h2 class="report-title">🏥 Licenças e Dispensas Médicas</h2>
    </div>
    <div class="locked" id="licdisp-locked">
      <button class="unlock-btn" onclick="promptPassword('licdisp')">Desbloquear Dashboard</button>
      <span class="error" id="licdisp-error"></span>
    </div>
    <div class="report-frame" id="licdisp-frame">
      <iframe title="LIC_DISP_MED" src="https://app.powerbi.com/view?r=eyJrIjoiNDNmZWY1MmMtNDdkMy00NzAyLTk5NDItNmU1YzVkYmVkMzBjIiwidCI6IjdjYWI1NzFlLWEyMGUtNDg2Mi1iNWY2LTE3M2I5NjEzMWYxOCJ9" allowfullscreen></iframe>
    </div>
  </div>

  <!-- Report 4: Carnaval 2026 -->
  <div class="report-section">
    <div class="report-header">
      <h2 class="report-title">🎭 Carnaval 2026</h2>
    </div>
    <div class="locked" id="carnaval2026-locked">
      <button class="unlock-btn" onclick="promptPassword('carnaval2026')">Desbloquear Dashboard</button>
      <span class="error" id="carnaval2026-error"></span>
    </div>
    <div class="report-frame" id="carnaval2026-frame">
      <iframe title="carnaval_2026_13bpm" src="https://app.powerbi.com/view?r=eyJrIjoiYWRmMTdiYmYtYTUwNS00ZTQ5LWEwYjctZmI3NDJlMDE4OTI4IiwidCI6IjdjYWI1NzFlLWEyMGUtNDg2Mi1iNWY2LTE3M2I5NjEzMWYxOCJ9" allowfullscreen></iframe>
    </div>
  </div>

  <script>
    const passwords = {
      iic: 'iic@13bpm',
      njd: 'njd@13bpm',
      licdisp: 'licdisp@13bpm',
      carnaval2026: 'carnaval2026@13bpm'
    };

    function promptPassword(reportId) {
      const input = prompt(`Senha para ${reportId.toUpperCase()}:`);
      const lockedDiv = document.getElementById(`${reportId}-locked`);
      const errorSpan = document.getElementById(`${reportId}-error`);
      
      if (!input) return;
      
      if (input === passwords[reportId]) {
        lockedDiv.style.display = 'none';
        document.getElementById(`${reportId}-frame`).style.display = 'block';
      } else {
        errorSpan.textContent = 'Senha incorreta!';
        errorSpan.style.display = 'inline';
        setTimeout(() => { errorSpan.style.display = 'none'; }, 4000);
      }
    }
  </script>
</body>
</html>
