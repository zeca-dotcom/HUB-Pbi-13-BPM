<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>13 BPM - Hub de Dashboards Power BI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;900&display=swap" rel="stylesheet">
  <style>
    /* PMMG 13 BPM – color schema: beige base, black, gold, dark red */
    :root {
      --bg-base: #f5f0e8;
      --bg-card: #faf8f4;
      --bg-card-hover: #fffef9;
      --text-primary: #1a1a1a;
      --text-secondary: #4a4a4a;
      --accent-gold: #b8860b;
      --accent-gold-light: #d4a84b;
      --accent-gold-glow: rgba(184, 134, 11, 0.25);
      --accent-red: #8b2230;
      --accent-red-light: #a52a3a;
      --accent-red-glow: rgba(139, 34, 48, 0.2);
      --border: rgba(26, 26, 26, 0.12);
      --border-strong: rgba(26, 26, 26, 0.2);
      --success: #2d6a2d;
      --error: #c53030;
      --font-heading: 'Raleway', sans-serif;
      --font-body: 'Raleway', sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      font-weight: 300;
      background: var(--bg-base);
      color: var(--text-primary);
      max-width: 1400px;
      margin: 0 auto;
      padding: 28px 24px;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* Futuristic subtle grid overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(26,26,26,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,26,26,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    body > * { position: relative; z-index: 1; }

    .page-title-wrap {
      text-align: center;
      margin-bottom: 48px;
      padding: 24px 16px;
    }

    h1 {
      font-family: var(--font-heading);
      font-weight: 900;
      font-size: 2.25rem;
      letter-spacing: 0.02em;
      color: var(--text-primary);
      margin: 0 0 8px 0;
      text-shadow: 0 2px 20px var(--accent-gold-glow);
    }

    .page-subtitle {
      font-weight: 300;
      font-size: 1rem;
      color: var(--text-secondary);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .report-section {
      margin: 28px 0;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 0;
      background: var(--bg-card);
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(26, 26, 26, 0.06), 0 1px 0 rgba(255,255,255,0.8) inset;
      transition: border-color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
      position: relative;
    }

    .report-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent-red), var(--accent-gold));
      opacity: 0.9;
      border-radius: 16px 16px 0 0;
    }

    .report-section:hover {
      border-color: var(--border-strong);
      box-shadow: 0 12px 40px var(--accent-gold-glow), 0 1px 0 rgba(255,255,255,0.9) inset;
      transform: translateY(-2px);
    }

    .report-header {
      padding: 22px 28px;
      background: linear-gradient(180deg, var(--bg-card-hover) 0%, var(--bg-card) 100%);
      border-bottom: 1px solid var(--border);
    }

    .report-title {
      font-family: var(--font-heading);
      font-weight: 900;
      font-size: 1.35rem;
      letter-spacing: 0.02em;
      color: var(--text-primary);
      margin: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .badge--public {
      background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-light));
      color: #1a1a1a;
      box-shadow: 0 2px 8px var(--accent-gold-glow);
    }

    .locked {
      padding: 44px 28px;
      text-align: center;
      background: linear-gradient(180deg, var(--bg-card) 0%, var(--bg-base) 100%);
      border-bottom: 1px solid var(--border);
    }

    .unlock-btn {
      background: linear-gradient(135deg, var(--accent-red), var(--accent-red-light));
      color: #fff;
      border: none;
      padding: 14px 28px;
      border-radius: 50px;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 0.95em;
      font-weight: 600;
      letter-spacing: 0.03em;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 16px var(--accent-red-glow);
    }

    .unlock-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.4s ease;
    }

    .unlock-btn:hover::before { left: 100%; }
    .unlock-btn:hover {
      transform: scale(1.03);
      box-shadow: 0 6px 24px var(--accent-red-glow);
    }

    input[type="password"] {
      padding: 12px 16px;
      margin: 0 12px;
      border: 2px solid var(--border-strong);
      border-radius: 12px;
      background: var(--bg-card);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 1em;
      font-weight: 300;
      min-width: 200px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input[type="password"]:focus {
      outline: none;
      border-color: var(--accent-gold);
      box-shadow: 0 0 0 3px var(--accent-gold-glow);
    }

    .error {
      color: var(--error);
      font-size: 0.9em;
      margin-left: 12px;
      display: none;
      animation: shake 0.5s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .report-frame {
      display: none;
      position: relative;
      background: var(--bg-base);
    }

    .report-frame.visible {
      display: block;
    }

    .report-frame iframe {
      width: 100%;
      height: 550px;
      border: none;
      border-radius: 0 0 16px 16px;
    }

    @media (max-width: 768px) {
      body { padding: 16px 12px; }
      h1 { font-size: 1.85rem; }
      .report-frame iframe { height: 400px; }
      input[type="password"] { min-width: 150px; display: block; margin: 10px auto; }
      .unlock-btn { padding: 12px 24px; width: 100%; max-width: 300px; }
    }
  </style>
</head>
<body>
  <div class="page-title-wrap">
    <h1>13 BPM</h1>
    <p class="page-subtitle">Hub de Dashboards Power BI</p>
  </div>

  <!-- Report 1: Interações Comunitárias (público, sem senha) -->
  <div class="report-section report-section--public">
    <div class="report-header">
      <h2 class="report-title">🔗 Interações Comunitárias <span class="badge badge--public">Público</span></h2>
    </div>
    <div class="report-frame visible" id="iic-frame">
      <iframe title="iic - 2025" src="https://app.powerbi.com/view?r=eyJrIjoiZjFlYWU5N2ItMmQ1Ny00NjBiLWJkY2ItZmZjYWQxNTQwYmM1IiwidCI6IjdjYWI1NzFlLWEyMGUtNDg2Mi1iNWY2LTE3M2I5NjEzMWYxOCJ9" allowfullscreen></iframe>
    </div>
  </div>

  <!-- Report 2: Núcleo de Justiça e Disciplina -->
  <div class="report-section">
    <div class="report-header">
      <h2 class="report-title">⚖️ Núcleo de Justiça e Disciplina</h2>
    </div>
    <div class="locked" id="njd-locked">
      <button class="unlock-btn" onclick="promptPassword('njd')">Desbloquear Dashboard</button>
      <span class="error" id="njd-error"></span>
    </div>
    <div class="report-frame" id="njd-frame">
      <iframe title="njd_13bpm" src="https://app.powerbi.com/view?r=eyJrIjoiZTVlMDRhMDItYzRmNy00MzY5LWI3MmEtZWEyZjRmNjg3M2QyIiwidCI6IjdjYWI1NzFlLWEyMGUtNDg2Mi1iNWY2LTE3M2I5NjEzMWYxOCJ9" allowfullscreen></iframe>
    </div>
  </div>

  <!-- Report 3: Licenças e Dispensas Médicas -->
  <div class="report-section">
    <div class="report-header">
      <h2 class="report-title">🏥 Licenças e Dispensas Médicas</h2>
    </div>
    <div class="locked" id="licdisp-locked">
      <button class="unlock-btn" onclick="promptPassword('licdisp')">Desbloquear Dashboard</button>
      <span class="error" id="licdisp-error"></span>
    </div>
    <div class="report-frame" id="licdisp-frame">
      <iframe title="LIC_DISP_MED" src="https://app.powerbi.com/view?r=eyJrIjoiNDNmZWY1MmMtNDdkMy00NzAyLTk5NDItNmU1YzVkYmVkMzBjIiwidCI6IjdjYWI1NzFlLWEyMGUtNDg2Mi1iNWY2LTE3M2I5NjEzMWYxOCJ9" allowfullscreen></iframe>
    </div>
  </div>

  <!-- Report 4: Carnaval 2026 -->
  <div class="report-section">
    <div class="report-header">
      <h2 class="report-title">🎭 Carnaval 2026</h2>
    </div>
    <div class="locked" id="carnaval2026-locked">
      <button class="unlock-btn" onclick="promptPassword('carnaval2026')">Desbloquear Dashboard</button>
      <span class="error" id="carnaval2026-error"></span>
    </div>
    <div class="report-frame" id="carnaval2026-frame">
      <iframe title="carnaval_2026_13bpm" src="https://app.powerbi.com/view?r=eyJrIjoiYWRmMTdiYmYtYTUwNS00ZTQ5LWEwYjctZmI3NDJlMDE4OTI4IiwidCI6IjdjYWI1NzFlLWEyMGUtNDg2Mi1iNWY2LTE3M2I5NjEzMWYxOCJ9" allowfullscreen></iframe>
    </div>
  </div>

  <script>
    const passwords = {
      njd: 'njd@13bpm',
      licdisp: 'licdisp@13bpm',
      carnaval2026: 'carnaval2026@13bpm'
    };

    function promptPassword(reportId) {
      const input = prompt(`Senha para ${reportId.toUpperCase()}:`);
      const lockedDiv = document.getElementById(`${reportId}-locked`);
      const errorSpan = document.getElementById(`${reportId}-error`);
      
      if (!input) return;
      
      if (input === passwords[reportId]) {
        lockedDiv.style.display = 'none';
        document.getElementById(`${reportId}-frame`).style.display = 'block';
      } else {
        errorSpan.textContent = 'Senha incorreta!';
        errorSpan.style.display = 'inline';
        setTimeout(() => { errorSpan.style.display = 'none'; }, 4000);
      }
    }
  </script>
</body>
</html>
